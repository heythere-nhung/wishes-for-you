<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Wishes for Nhung 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/emoji-toolkit@9.0.1/lib/js/joypixels.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--blush:#f9c4cc;--peach:#fddbb4;--lavender:#e8d5f5;--cream:#fef8f0;--gold:#e8b86d;--coral:#f28b82;--rose:#d4637a;--soft:#7a5a63;--deep:#3d2532}
html{scroll-behavior:smooth}
body{background:var(--cream);font-family:'DM Sans',sans-serif;color:var(--deep);min-height:100vh;overflow-x:hidden;-webkit-text-size-adjust:100%}
.petal{position:fixed;pointer-events:none;animation:floatDown linear infinite;opacity:.35;z-index:0}
@keyframes floatDown{0%{transform:translateY(-20px) rotate(0deg);opacity:0}10%{opacity:.35}90%{opacity:.15}100%{transform:translateY(105vh) rotate(360deg);opacity:0}}

/* HERO */
.hero{text-align:center;padding:clamp(36px,8vw,56px) 20px 28px;position:relative;z-index:1}
.hero-title{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,5.5vw,3.2rem);color:var(--rose);line-height:1.2;animation:fadeUp 1.2s ease both}
.hero-sub{font-size:clamp(.85rem,.98rem,1rem);color:var(--soft);margin-top:10px;font-style:italic;animation:fadeUp 1.5s ease both}
.divider{display:flex;align-items:center;justify-content:center;gap:12px;margin:18px auto;animation:fadeUp 1.7s ease both}
.dl{width:60px;height:1px;background:linear-gradient(to right,transparent,var(--blush))}
.dr{width:60px;height:1px;background:linear-gradient(to left,transparent,var(--blush))}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}

/* HUB */
.hub{display:flex;flex-direction:column;align-items:center;margin:0 auto 40px;position:relative;z-index:1;animation:fadeUp 1.9s ease both}
.hub-ring{width:clamp(100px,22vw,130px);height:clamp(100px,22vw,130px);border-radius:50%;overflow:hidden;border:3px solid rgba(249,196,204,.6);box-shadow:0 0 0 8px rgba(249,196,204,.14),0 0 0 18px rgba(249,196,204,.06);animation:pulse 4s ease-in-out infinite;flex-shrink:0}
.hub-ring img{width:100%;height:100%;object-fit:cover;object-position:center 15%}
@keyframes pulse{0%,100%{box-shadow:0 0 0 8px rgba(249,196,204,.14),0 0 0 18px rgba(249,196,204,.06)}50%{box-shadow:0 0 0 14px rgba(249,196,204,.2),0 0 0 28px rgba(249,196,204,.08)}}
.hub-name{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,4vw,1.45rem);color:var(--rose);margin-top:12px;letter-spacing:.5px}
.hub-caption{font-size:.7rem;color:var(--soft);margin-top:4px;letter-spacing:1.2px;text-transform:uppercase}

/* GARDEN */
.garden{max-width:960px;margin:0 auto;padding:0 16px clamp(60px,10vw,80px);position:relative;z-index:1}
.garden-label{text-align:center;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;color:var(--soft);margin-bottom:20px;opacity:.6}
.random-btn{display:block;margin:0 auto 28px;padding:10px 26px;border:1.5px solid rgba(212,99,122,.35);background:transparent;border-radius:40px;font-family:'DM Sans',sans-serif;font-size:.85rem;color:var(--rose);cursor:pointer;letter-spacing:.5px;transition:all .3s;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.random-btn:hover{background:rgba(249,196,204,.22);border-color:var(--rose)}
.random-btn:active{transform:scale(.96)}

/* GRID — responsive columns */
.flowers-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,220px),1fr));gap:16px}

/* FLOWER CARD */
.flower-card{cursor:pointer;animation:bloomIn .7s ease both;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@keyframes bloomIn{from{opacity:0;transform:scale(.88) translateY(14px)}to{opacity:1;transform:scale(1) translateY(0)}}
.flower-stem{width:2px;height:22px;background:linear-gradient(to top,#a8d5a2,#c8e6c9);margin:0 auto;border-radius:2px}
.flower-bloom{background:#fff;border-radius:20px;padding:15px;border:1.5px solid rgba(249,196,204,.38);transition:all .3s cubic-bezier(.34,1.56,.64,1);position:relative;overflow:hidden}
.flower-bloom::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(to right,var(--blush),var(--peach),var(--lavender));opacity:.75}
.flower-card:hover .flower-bloom,.flower-card:active .flower-bloom{transform:translateY(-5px) scale(1.02);box-shadow:0 12px 30px rgba(212,99,122,.13);border-color:rgba(249,196,204,.68)}
.fi{font-size:24px;margin-bottom:8px;display:block;animation:sway 3s ease-in-out infinite;transform-origin:center bottom}
@keyframes sway{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
.fn{font-family:'Playfair Display',serif;font-size:.9rem;color:var(--rose);font-weight:600;margin-bottom:5px}
.keywords{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:9px}
.kw{font-size:.6rem;padding:2px 7px;border-radius:20px;background:linear-gradient(135deg,rgba(249,196,204,.26),rgba(253,219,180,.26));color:var(--rose);border:1px solid rgba(212,99,122,.16);line-height:1.6}
.wp{font-size:.78rem;color:var(--soft);line-height:1.6;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.oh{margin-top:8px;font-size:.65rem;color:rgba(212,99,122,.38);text-align:right;transition:color .2s}
.flower-card:hover .oh,.flower-card:active .oh{color:var(--coral)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(61,37,50,.54);backdrop-filter:blur(7px);-webkit-backdrop-filter:blur(7px);z-index:100;display:flex;align-items:flex-end;justify-content:center;padding:0;opacity:0;pointer-events:none;transition:opacity .3s}
@media(min-width:600px){.modal-overlay{align-items:center;padding:20px}}
.modal-overlay.open{opacity:1;pointer-events:all}
.mc{background:var(--cream);border-radius:24px 24px 0 0;max-width:100%;width:100%;padding:28px 22px 32px;position:relative;transform:translateY(30px);transition:transform .38s cubic-bezier(.34,1.56,.64,1);max-height:88vh;overflow-y:auto;border:1.5px solid rgba(249,196,204,.48);-webkit-overflow-scrolling:touch}
@media(min-width:600px){.mc{border-radius:28px;max-width:480px;padding:32px 28px;transform:scale(.9) translateY(18px)}}
.modal-overlay.open .mc{transform:translateY(0)}
@media(min-width:600px){.modal-overlay.open .mc{transform:scale(1) translateY(0)}}
.mc-drag{width:40px;height:4px;background:rgba(212,99,122,.25);border-radius:4px;margin:0 auto 16px;display:block}
@media(min-width:600px){.mc-drag{display:none}}
.mcl{position:absolute;top:13px;right:13px;width:30px;height:30px;border-radius:50%;background:rgba(249,196,204,.3);border:none;cursor:pointer;font-size:13px;color:var(--soft);display:flex;align-items:center;justify-content:center;transition:background .2s;-webkit-tap-highlight-color:transparent}
.mcl:hover{background:rgba(249,196,204,.58)}
.mf{font-size:32px;display:block;margin-bottom:8px}
.mn{font-family:'Playfair Display',serif;font-size:clamp(1.2rem,5vw,1.42rem);color:var(--rose);margin-bottom:7px}
.mk{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:14px}
.ms{margin-bottom:14px}
.msl{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:5px;font-weight:500}
.mst{font-size:.86rem;color:var(--soft);line-height:1.8}
.mw{background:linear-gradient(135deg,rgba(249,196,204,.14),rgba(232,213,245,.14));border-left:3px solid var(--blush);border-radius:0 12px 12px 0;padding:12px 14px;font-size:.86rem;color:var(--deep);line-height:1.85;font-style:italic}

/* ENDING */
.ending{text-align:center;padding:clamp(32px,6vw,40px) 20px clamp(48px,8vw,56px);position:relative;z-index:1}
.et{font-family:'Playfair Display',serif;font-size:clamp(.88rem,2.5vw,1.18rem);color:var(--soft);line-height:2.1;max-width:340px;margin:0 auto}
.eh{font-size:20px;margin-top:14px;animation:hb 2.2s ease-in-out infinite}
@keyframes hb{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}
.cb{display:inline-block;margin-top:16px;font-size:.66rem;letter-spacing:1px;text-transform:uppercase;color:rgba(122,90,99,.3);border:1px dashed rgba(212,99,122,.15);padding:5px 12px;border-radius:20px}
</style>
</head>

</section>

const wishes=[{"name": "Chau Luu", "kw": ["Xinh đẹp", "khéo léo", "tài giỏi"], "m": "Trong chuyến công tác Thái Lẻn của hai chị em có nhìu kỷ niệm đáng nhớ, mà đáng nhớ nhất trong đó chắc là buổi onsite ở venue sự kiện. Hum đó hai chị em đã soạn sửa sẵn sàng để đến nơi là tác nghiệp được liền, nhưng bé Nhung pị cô bảo vệ ở cổng khum cho vào vì mang dép hở ngón =)) Ở đất nước í họ quy định là phải mang giày dép che được ngón khi vào những nơi quan trọng, đặc biệt là organizer, nên sau khi năn nỉ bất thành thì Chấu be ở lại chờ, Nhúng be phải bắt Grab về nhà thay giày rùi lại bắt Grab lên venue lại. Một cái mắc cười khác là vì quy định như vị, nên trong venue đó có 7-11 có bán rất nhiều vớ lun (để che ngón chân) =))", "i": "Khum có một \"chiến binh toàn năng\" đồng hành trong các dự án :( Luôn cảm thấy yên tâm với mọi task có cổ cùng làm.", "w": "Chúc bé Nhung mãi toả sáng như em vẫn luôn, dù ở bất cứ nơi đâu <3"}, {"name": "Em Bình", "kw": ["Xinh đẹp", "dễ thương", "giỏi"], "m": "Hi em thấy rất trân trọng những lúc em hỏi bài chị Nhung mà chị chỉ rất tận tình và có tâm lun, em thấy chị Nhung siêu giỏi với là 1 tấm gương để em học theo ạ", "i": "chắc nụ cười thần tiên tỉ tỉ của chỉ, quá xinh đẹp", "w": "Em chúc chị Nhung sẽ có thêm thật nhiều trải nghiệm đẹp trong hành trình sắp tới, luôn vui vẻ, hạnh phúc và gặp những cơ hội tốt đẹp nhenn chị"}, {"name": "HaiTT5", "kw": ["thoughtful", "creative", "focused"], "m": "The user interview clip in Company Trip 2025, during such a short period of time, we pulled off the clip with such quality (at least for things that are under our control). Nhung, even though she was very busy during her personal time, invested so much effort to make it happen. Thank you doesn't feel like enough.", "i": "Our HR-CBC brainstorming sessions during the last 3 or so years, Nhung has always been there and contributed.", "w": "I wish you warmth and fulfillment on whatever path you take next"}, {"name": "Trung Anh", "kw": ["cute", "serein", "muse"], "m": "Với bé Nhung thì chị không đặt điều đáng nhớ nằm trong một khoảnh khắc cố định nào mà là rất nhiều khoảnh khắc nho nhỏ, nằm trong ấn tượng của chị ^^", "i": "Một cô bé nhẹ nhàng, đầy năng lượng, luôn hỗ trợ mọi người", "w": "Chúc em hành trình mới (đã) có được người để cùng vui cùng buồn, có công việc và mục tiêu để nỗ lực, có ước mơ trong tim để luôn rộn ràng, và có những giá trị thật đặc biệt của riêng mình để tỏa sáng. Wish you all the best nhe bé Nhung."}, {"name": "chị Phạnh", "kw": ["Charming", "Soft", "Hard-working"], "m": "Lần đầu tiên chị làm việc với bé Nhung là từ đợt UpRace Day 2022 Internal Challenge và em bé siu chăm chỉ, dễ thương và ngoan ngoãn. Hồi đó tui còn từng gán ghép bé và Ngoan team TrueID tại thấy đẹp đôi kakakaka", "i": "You're so charming babe. Chị sẽ nhớ mãi cô gái rất là xinh xắn dịu dàng với mái tóc đen dài nhưng mà không nề hà làm việc gì cả", "w": "Hiuhiu dù rất là nuối tiếc, bé đã tốt nghiệp VNG rồi. Nhưng cũng thật may mắn bé đã có mái ấm gia đình của riêng mình. Chị chúc bé Nhung sẽ có nhiều trải nghiệm rực rỡ hơn nữa trên con đường sắp tới, và dù có chuyện gì xảy ra, Nhung sẽ luôn có gia đình ở bên nha. Yêu thương <3"}, {"name": "NamDH4", "kw": ["Nhỏ nhắn", "tâm huyết", "chỉn chu"], "m": "Chắc là lúc Nhung quyết định đi học Đạo để lập gia đình, Nhung hay kể cho anh nghe và nhắc anh những ngày lễ quan trọng", "i": "Nhớ những project chung mà 2 anh em mình từng làm, từ những ngày đầu làm Zalopay, cho đến trang Career hiện tại, Nhung hiểu và rất chỉn chu trong từng công việc mà em handle.", "w": "Chúc em trước tiên là có được khoảng thời gian chữa lành sau rất nhiều biến động cuộc đời, gia đình thật hạnh phúc và viên mãn, sau đó hãy tìm 1 công việc mới thật phù hợp với em nhé"}, {"name": "Ân", "kw": ["Xinh"], "m": "Mấy lần qua team design năn nỉ ỉ ôi", "i": "cổ", "w": "Vẫn cứ là em nha Nhung."}, {"name": "Châu Moon", "kw": ["Nhẹ nhàng", "xinh gái"], "m": "Không làm việc với Nhung nhiều nhưng đây là cô gái năng lượng, luôn nhẹ nhàng.", "i": "Sự nhẹ nhàng của cổ", "w": "VNG với giống như một điểm dừng chân trên hành trình dài. Một \"tiệm tạp hóa\" nhỏ mà em ghé vào, rồi vô tình mang theo rất nhiều thứ quý giá, từ kiến thức, kỹ năng, kỷ niệm cho đến những mối quan hệ và góc nhìn mới. Em nạp đầy bình xăng bằng những hành trang đó để sẵn sàng cho những chặng đường phía trước. Chúng ta có duyên gặp nhau ở \"tiệm tạp hóa\" ấy, rồi mỗi người sẽ tiếp tục hành trình của mình --- người đi trước, người đi sau. Chúc Nhung luôn bình an, vững bước trên mọi con đường, và vẫn giữ được sự nhẹ nhàng rất riêng của mình nhé 💛"}, {"name": "Gia Vĩ", "kw": ["Cẩn trọng (và đó là một điều mà anh thiếu)"], "m": "Nhiều quá hong nhớ! Chỉ nhớ là không có một cái nào là buồn!", "i": "Nhớ nụ cười của cổ ó", "w": "Chúc em mỗi bước đi đều dẫn tới nơi hạnh phúc!"}, {"name": "Em Huyền", "kw": ["Chị Nhung siu cấp xinh và dịu dàng lun hic hic"], "m": "Dù ít làm việc với chị Nhung nhưng từ lúc em join team CBC và làm việc với chị, chị đã luôn nhẹ nhàng chỉ dẫn em từng việc nhỏ ❤️❤️❤️", "i": "Hiu hiu nhớ sự xinh ẹp của cổ lém", "w": "Chúc chị Nhung sắp tới sẽ luôn có nhiều năng lượng tích cực và luôn hạnh phúc trên con đường của chị nhe"}, {"name": "Hải Linh", "kw": ["Chiến tướng"], "m": "Ấn tượng ban đầu bé Nhung khá là cool girl đoá, mà càng tiếp xúc thì mới thấy là ẻm bị ngại thui. Những lần làm việc chung đều luôn ấn tượng bé Nhung rất chuyên nghiệp, có chủ kiến và nhiệt thành ý. Nói chung là xịnnnnn.", "i": "Nụ cười mỉm chun mũi và mái tóc suôn óng mượt :3", "w": "Với ngọn lửa nhiệt huyết và sự nhanh nhẹn, thông minh của em, chị tin là bé Nhung sẽ có chặng đường tiếp theo thật rực rỡ. Chúc bé thật nhiều an vui, may mắn trong cả công việc và cuộc sống gia đình, bản thân nhé! ♡"}, {"name": "Nie", "kw": ["Tóc đẹp như suối"], "m": "Lần đầu tiên Nie cứ nghĩ em là học sinh cấp 3, theo mẹ vào cbc ngồi chơi. Sau đó, làm việc chung thì thấy nhỏ này nhỏ, nhưng \"đô\" mạnh dữ thần luôn.", "i": "Sẽ nhớ lắm nụ cười đáng yêu, nhẹ nhàng của cục cưng.", "w": "Chặng đường sắp đến tụi tui thiếu vắng em, sẽ buồn nhiều lắm. Nhưng mong hành trình sắp tới, dù đi đâu, làm gì thì mãi luôn là Nhung đẹp gái, vì đẹp gái thì làm ơn đừng buồn nhen. Nie thương em!"}, {"name": "ThoaNTK4", "kw": ["Đẹp gái", "dịu dàng", "trắng ơi là trắng luônnn"], "m": "Tham gia các cuộc thi, event với Trường ĐH Công nghệ thông tin, di chuyển xa xôi xuống Thủ Đức nhưng chị em vẫn có nhau vô cùng xinh tươi và vui vẻ. Nhung thì bị say xe ô tô nên là có cùng mục tiêu nhưng lúc nào cổ cũng tới trước hahaha", "i": "Thiếu vắng một người em làm Uni Partnership cùng trường, một đồng nghiệp tận tâm và giỏi giang xinh đẹp. You will be missed <333", "w": "Chúc em Nhung sẽ có thời gian nghỉ ngơi thật tuyệt vời trước khi trở lại đường đua nha. Mong mọi thứ tốt đẹp sẽ đến với emmmm. Cảm ơn em rất nhiều cho những đóng góp và nỗ lực giúp team mình trở nên thật vững mạnh <333"}, {"name": "bé Lạc Nghiên", "kw": ["tôi yêu phụ nữ, đặc biệt là phụ nữ đẹp và trùng hợp thay, chị Nhung là một trong số đó."], "m": "mọi khoảnh khắc với những người đẹp gái đều đáng nhớ. Em nên bắt đầu từ đâu đây? Nhưng, khoảnh khắc gần nhất em ấn tượng có lẽ là lúc chị Nhung bước lên lễ đường. Chúc mừng chị đã kết hôn, chúc mừng chồng chị đã có được chị...", "i": "em nghĩ là giúm câu 2 á...", "w": "chúc chị Nhung mãi xinh đẹp tuyệt vời, mãi hạnh phúc, mãi lan tỏa sự dịu dàng của mình đến bất kỳ nơi nào chị đặt chân đến. Chúc chị tất cả (trừ vất vả)..."}, {"name": "thimc", "kw": ["Xinh", "calm"], "m": "Chỉ vì đoán đúng trò Gián điệp trong Running man mà bị tố là gián điệp của tổ :)))", "i": "Một cô gái bé nhỏ, luôn xinh xắn rạng rỡ", "w": "Wishing you a beautiful journey ahead, full of great moments and surrounded by people who truly matter."}, {"name": "Thanh Vân", "kw": ["Hoa Huệ"], "m": "hmm chắc là lần làm việc cùng nhau với team khác", "i": "Nhớ những cái cổ brief", "w": "Tâm an vạn sự an, Tâm lành vạn sự tròn đầy"}, {"name": "TuyetNHN", "kw": ["chuyên nghiệp", "dịu dàng", "rực rỡ", "chị gái", "người mẫu ảnh"], "m": "Hehe em chưa được làm việc nhiều với chị Nhung. Lần đầu hai chị em làm với nhau là Task Bưng rượu cho VNG+1 =)), rất là hỗn loạn, chạy qua chạy lại. Rất vui vì đợt team building CBC chị em mình có cơ hội nhảy cùng nhau, em thấy chị nhảy cũng cũng đó. À có 1 điều em rất ấn tượng ở chị Nhung, là chị Nhung khá competitive trong khi chơi game haha, hay là FTUer nào cũng dị ta.", "i": "Là khi em được hỗ trợ chị tại event ZPS, chị Nhung rất chuyên nghiệp và gọn gàng, em thích làm việc với chị lắm luôn T-T . Ngoài công việc thì đáng nhớ nhứt chắc là quả visual của chị hẹ hẹ, cảm tưởng mỗi lần thấy chị là nhạc nền phim Hàn Quốc chèn phía sau, background hoa cỏ xung quanh.", "w": "Chúc chị Nhung và gia đình nhỏ sẽ có một hành trình thật rực rỡ. Chị đăng nhiều hình để các em nhỏ ngắm nhé <3"}, {"name": "NgocNPB", "kw": ["xinh iu & mindful"], "m": "Được làm roommate 2 đêm tại Vĩnh Hy, ra ban công đứng ngắm mặt trăng đỏ siêu to khổng lồ =))))) Đợt đóa team order trà sữa mà em ngủ như chết, xong hình như cổ lấy trà sữa cho em rồi để sẵn tủ lạnh cho em luôn. Ô mai ca T_T", "i": "Nhớ mỗi sáng thứ 2 tag cổ trong nhóm Internal Zalopay để lấy tin Monday Buzz", "w": "Chúc chị Nhung luôn hạnh phúc & làm mọi thứ với tâm thế nhẹ nhàng, cuộc sống xung quanh và hành trình sắp tới cũng sẽ nhẹ nhàng với chị Nhung nhiều nhiều ạ."}, {"name": "Lam Đa", "kw": ["Dịu dàng", "Xinh xắn", "Chỉn chu"], "m": "Nhớ đợt UpRace chung team Hạt Dưa với bé Nhung, hai chị em chạy không nổi nhưng cổ vũ nhau ráng chạy ngày x2 thành tích ở Vũng Tàu, quyết tâm không đứng bét bảng =))) cuối cùng bé Nhung vươn lên hơn chị tận mấy hạng =)))", "i": "Chị sẽ nhớ một bé Nhung xinh xắn, luôn tỏa ra vibe dịu dàng, giàu cảm xúc nhưng cũng rất mạnh mẽ trong từng lời nói, chỉn chu trong từng bài viết em gửi. Em đã mang đến một nguồn năng lượng tích cực và một câu chuyện tình yêu thiệt đẹp cho team EB.", "w": "Chúc bé Nhung thật nhiều niềm vui và trọn vẹn với chặng đường mới. Dù có trên hành trình nào của cuộc sống, chị chúc bé Nhung sẽ luôn tin vào bản thân, dịu dàng với chính mình và vững vàng tiến về phía trước."}, {"name": "Phan Kim Thoại", "kw": ["Hướng nội và siêng năng"], "m": "Khoảnh khắc đáng nhớ nhất với anh chính là giai đoạn anh em mình cùng ngồi chia sẻ về những thay đổi trong giai đoạn chuyển giao từ bên DB sang CBC.", "i": "Điều nhớ nhất trước khi tạm biệt mái trường chắc có lẽ là hôm đám cưới của em. Mọi thứ nhẹ nhàng, xúc động và tràn đầy ý nghĩa. Vì anh không có tham dự nhiều đám cưới :))", "w": "Chúc bé Nhung trên hành trình mới vẫn luôn giữ được sự điềm tĩnh và tận tâm vốn có. Anh rất trân trọng những lần anh em mình ngồi lại chia sẻ trong giai đoạn chuyển giao vừa qua. Mong mọi điều thuận lợi sẽ đến với em ở bến đỗ mới nhee. Good luck thiệt nhiều!!"}, {"name": "ngocnb6", "kw": ["nhẹ nhàng", "thùy mị"], "m": "Chắc là khúc Nhung bắt được bông cưới của chị xong mấy tháng sau lấy chồng lun <3", "i": "Những buổi đi ăn trên canteen cùng team chị em ăn trưa", "w": "Chúc em luôn luôn hạnh phúc trọn vẹn với gia đình và người thương, vui vẻ với những gì mình chọn trong cuộc sống và công việc nhenn. Best of luck to you bé Nhung <3"}, {"name": "Mã Tố Trinh", "kw": ["Xinh gái", "Hoạt bát", "Rốp Rẻng"], "m": "Hehe, ngay từ lần đầu gặp mặt lun là đã ấn tượng vì chị Nhung nói chuyện rất khéo léo và rất nhanh nhẹn, kiểu tạo cảm giác thoải mái với người đối diện ạ. Ngay cả lúc làm việc chung ở một vài dự án, cách làm việc của chị cũng khiến em mong muốn học hỏi thêm gất nhiều ạ", "i": "huhu sẽ nhớ mãi sự nhanh nhẹn và rốp rẻng của cổ ạaa", "w": "Em chúc chị Nhung gia đình hạnh phúc, sự nghiệp thăng hoa, tiền bạc rủng rỉnh và thiệt rực rỡ trên hành trình phía trước nhen <3"}, {"name": "NhiLNY", "kw": ["Dịu Dàng", "Mạnh Dạn", "Rốp Rẻng"], "m": "\"Hehe thật ra thì em và Nhung không có nhiều cơ hội làm việc trực tiếp cùng nhau, chủ yếu là support phần air bài các kênh thôi. Nên chắc kỷ niệm đáng nhớ nhất là lần Nhung tư vấn và lên chiến lư nhớ một thành viên \"nhỏ mà có võ\" luôn có những giá trị và dấu ấn riêng trong từng việc mình làm.", "w": "Cảm ơn em Nhung đã là 1 mảnh ghép quan trọng của team, cùng học tập, phát triển và trưởng thành trong 1 hành trình dài đáng nhớ ở VNG. Chúc em có nhiều năng lượng, sức khỏe và thật hạnh phúc với những lựa chọn của mình."}, {"name": "Chị Hoài", "kw": ["Chuyên tâm", "thông minh", "độc lập"], "m": "Chắc sẽ là khoảnh khắc Nhung chia sẻ quyết định rời VNG. Dù có bất ngờ, chị vẫn thấu hiểu quyết định của em vì biết rằng em đã suy nghĩ thấu đáo. Hai chị em trước giờ luôn thảo luận và chia sẻ với nhau trên tinh thần tôn trọng suy nghĩ và hành động. Biết ơn mối quan hệ này <3", "i": "Chị sẽ nhớ mãi một cô bé có một tư duy hệ thống và suy nghĩ sâu sắc, sáng tạo và cầu toàn trong công việc.", "w": "Chúc Nhúng Be một hành trình mới mẻ, phát triển thật ý nghĩa như em mong muốn. Hy vọng em có được những điều tốt đẹp nhất <3"}];
function buildCards(){
  const g=document.getElementById('fg');
  wishes.forEach((w,i)=>{
    const c=document.createElement('div');
    c.className='flower-card';
    c.style.animationDelay=(i*0.05)+'s';
    c.onclick=()=>openModal(i);
    const f=fl[i%fl.length];
    c.innerHTML='<div class="flower-stem"></div><div class="flower-bloom"><span class="fi" style="animation-delay:'+(i*0.18)+'s">'+f+'</span><div class="fn">'+w.name+'</div><div class="keywords">'+w.kw.map(k=>'<span class="kw">'+k+'</span>').join('')+'</div><p class="wp">“'+w.w+'”</p><div class="oh">tap to open ✦</div></div>';
    g.appendChild(c);
  });
  document.getElementById('cb').textContent='✦ '+wishes.length+' wishes from the heart ✦';
}
function openModal(i){
  const w=wishes[i],f=fl[i%fl.length];
  document.getElementById('mF').textContent=f;
  document.getElementById('mN').textContent=w.name;
  document.getElementById('mK').innerHTML=w.kw.map(k=>'<span class="kw">'+k+'</span>').join('');
  document.getElementById('mM').textContent=w.m;
  document.getElementById('mI').textContent=w.i;
  document.getElementById('mW').textContent='“'+w.w+'”';
  document.getElementById('modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function showRandom(){openModal(Math.floor(Math.random()*wishes.length));}
function closeModal(e){if(e.target===document.getElementById('modal'))closeModalBtn();}
function closeModalBtn(){document.getElementById('modal').classList.remove('open');document.body.style.overflow='';}
function buildPetals(){
  const c=document.getElementById('petals');
  const em=['🌸','🌺','✵','🌷','❀','🪷'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div');
    p.className='petal';p.textContent=em[i%em.length];
    p.style.left=Math.random()*100+'vw';
    p.style.fontSize=(9+Math.random()*7)+'px';
    p.style.animationDuration=(10+Math.random()*12)+'s';
    p.style.animationDelay=(Math.random()*20)+'s';
    c.appendChild(p);
  }
}
// swipe down to close on mobile
(function(){
  let sy=0;
  const mc=document.querySelector('.mc');
  mc.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;},{passive:true});
  mc.addEventListener('touchmove',e=>{
    if(mc.scrollTop===0&&e.touches[0].clientY-sy>60)closeModalBtn();
  },{passive:true});
})();
buildPetals();buildCards();
</script>
